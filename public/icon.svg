<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.7"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <!-- Map pin icon (matches lucide Map icon simplified) -->
  <g transform="translate(128, 96) scale(1.0)" fill="none" stroke="white" stroke-width="24" stroke-linecap="round" stroke-linejoin="round">
    <!-- Map outline -->
    <polygon points="0,48 85.3,0 170.7,48 256,0 256,272 170.7,320 85.3,272 0,320" fill="none"/>
    <!-- Map fold lines -->
    <line x1="85.3" y1="0" x2="85.3" y2="272"/>
    <line x1="170.7" y1="48" x2="170.7" y2="320"/>
  </g>
</svg>
